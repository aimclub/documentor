# Configuration for working with LLM (Large Language Models)

# LLM provider settings
providers:
  qwen:
    # Qwen for text analysis
    text:
      model: "qwen2.5-7b-instruct"  # or other model
      base_url: null  # API URL, if null - uses local model
      temperature: 0.1
      max_tokens: 4096
      timeout: 60
    
    # Qwen VL for visual analysis (OCR)
    visual:
      model: "qwen2-vl-7b-instruct"  # or other VL model
      base_url: null
      temperature: 0.1
      max_tokens: 4096
      timeout: 120
  
  openai:
    # Optional OpenAI support
    model: "gpt-4o"
    base_url: null
    temperature: 0.1
    max_tokens: 4096
    timeout: 60

# Text chunking settings
chunking:
  # Chunk size for LLM analysis
  chunk_size: 3000  # characters
  
  # Overlap between chunks
  overlap: 1  # paragraphs
  
  # Minimum chunk size (if smaller - merge with previous)
  min_chunk_size: 100

# Prompts for various tasks
prompts:
  # Header detection in text
  header_detection: |
    Analyze the following text and identify all headers with their levels.
    
    Rules:
    - Headers should be distinguished from regular text
    - Determine header level (1-6, where 1 is the top level)
    - Consider existing hierarchy: {previous_headers}
    - Check logic: a header of level N cannot contain a header of level < N
    
    Text:
    {text}
    
    Return result in JSON format:
    {{
      "headers": [
        {{"level": 1, "text": "Header", "position": 0}},
        {{"level": 2, "text": "Subheader", "position": 150}}
      ]
    }}
  
  # Document element classification
  structure_classification: |
    Analyze the following text and classify document elements.
    
    Identify element types:
    - Headers (with levels)
    - Regular text (paragraphs)
    - Image captions
    - Table captions
    - Lists
    - Quotes
    
    Text:
    {text}
    
    Return result in JSON format with elements and their types.
  
  # Visual document structure analysis
  visual_structure_analysis: |
    Analyze the document image and determine its structure.
    
    Find:
    - Headers and their levels
    - Paragraph text
    - Images and their captions
    - Tables
    - Other structural elements
    
    Return result in structured format.

# Header processing settings
headers:
  # Maximum header level
  max_level: 6
  
  # Minimum header level
  min_level: 1
  
  # Hierarchy validation (checking level logic)
  validate_hierarchy: true

# LLM response processing settings
response_processing:
  # JSON response parsing
  parse_json: true
  
  # Parse error handling
  handle_parse_errors: true
  
  # Retries on errors
  retry_on_error: true
  max_retries: 3
