# Конфигурация для работы с LLM (Large Language Models)

# Настройки провайдеров LLM
providers:
  qwen:
    # Qwen для текстового анализа
    text:
      model: "qwen2.5-7b-instruct"  # или другая модель
      base_url: null  # URL для API, если null - используется локальная модель
      temperature: 0.1
      max_tokens: 4096
      timeout: 60
    
    # Qwen VL для визуального анализа (OCR)
    visual:
      model: "qwen2-vl-7b-instruct"  # или другая VL модель
      base_url: null
      temperature: 0.1
      max_tokens: 4096
      timeout: 120
  
  openai:
    # Опциональная поддержка OpenAI
    model: "gpt-4o"
    base_url: null
    temperature: 0.1
    max_tokens: 4096
    timeout: 60

# Настройки разбиения текста на чанки
chunking:
  # Размер чанка для LLM анализа
  chunk_size: 3000  # символов
  
  # Перекрытие между чанками
  overlap: 1  # параграфов
  
  # Минимальный размер чанка (если меньше - объединить с предыдущим)
  min_chunk_size: 100

# Промпты для различных задач
prompts:
  # Детектирование заголовков в тексте
  header_detection: |
    Проанализируй следующий текст и определи все заголовки с их уровнями.
    
    Правила:
    - Заголовки должны быть выделены из обычного текста
    - Определи уровень заголовка (1-6, где 1 - самый верхний уровень)
    - Учти существующую иерархию: {previous_headers}
    - Проверь логику: внутри заголовка уровня N не может быть заголовка уровня < N
    
    Текст:
    {text}
    
    Верни результат в формате JSON:
    {{
      "headers": [
        {{"level": 1, "text": "Заголовок", "position": 0}},
        {{"level": 2, "text": "Подзаголовок", "position": 150}}
      ]
    }}
  
  # Классификация элементов документа
  structure_classification: |
    Проанализируй следующий текст и классифицируй элементы документа.
    
    Определи типы элементов:
    - Заголовки (с уровнями)
    - Обычный текст (параграфы)
    - Подписи к изображениям
    - Подписи к таблицам
    - Списки
    - Цитаты
    
    Текст:
    {text}
    
    Верни результат в формате JSON с элементами и их типами.
  
  # Визуальный анализ структуры документа
  visual_structure_analysis: |
    Проанализируй изображение документа и определи его структуру.
    
    Найди:
    - Заголовки и их уровни
    - Текст параграфов
    - Изображения и их подписи
    - Таблицы
    - Другие структурные элементы
    
    Верни результат в структурированном формате.

# Настройки для работы с заголовками
headers:
  # Максимальный уровень заголовка
  max_level: 6
  
  # Минимальный уровень заголовка
  min_level: 1
  
  # Валидация иерархии (проверка логики уровней)
  validate_hierarchy: true

# Настройки для обработки ответов от LLM
response_processing:
  # Парсинг JSON ответов
  parse_json: true
  
  # Обработка ошибок парсинга
  handle_parse_errors: true
  
  # Повторные попытки при ошибках
  retry_on_error: true
  max_retries: 3
