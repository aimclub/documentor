# Configuration for working with OCR (Optical Character Recognition)

# Dots.OCR settings for layout detection
dots_ocr:
  # URL or path to Dots.OCR service
  endpoint: null  # if null - uses local service
  
  # Request timeout
  timeout: 60
  
  # Prompts for Dots.OCR (strict prompts from official documentation)
  prompts:
    # Full layout extraction with text in JSON format
    prompt_layout_all_en: |
      Please output the layout information from the PDF image, including each layout element's bbox, its category, and the corresponding text content within the bbox.

      1. Bbox format: [x1, y1, x2, y2]

      2. Layout Categories: The possible categories are ['Caption', 'Footnote', 'Formula', 'List-item', 'Page-footer', 'Page-header', 'Picture', 'Section-header', 'Table', 'Text', 'Title'].

      3. Text Extraction & Formatting Rules:
          - Picture: For the 'Picture' category, the text field should be omitted.
          - Formula: Format its text as LaTeX.
          - Table: Format its text as HTML.
          - All Others (Text, Title, etc.): Format their text as Markdown.

      4. Constraints:
          - The output text must be the original text from the image, with no translation.
          - All layout elements must be sorted according to human reading order.

      5. Final Output: The entire output must be a single JSON object.
    
    # Layout detection only without text
    prompt_layout_only_en: |
      Please output the layout information from this PDF image, including each layout's bbox and its category. The bbox should be in the format [x1, y1, x2, y2]. The layout categories for the PDF document include ['Caption', 'Footnote', 'Formula', 'List-item', 'Page-footer', 'Page-header', 'Picture', 'Section-header', 'Table', 'Text', 'Title']. Do not output the corresponding text. The layout result should be in JSON format.
    
    # Text extraction from image (except Page-header and Page-footer)
    prompt_ocr: |
      Extract the text content from this image.
    
    # Text extraction from given bounding box
    prompt_grounding_ocr: |
      Extract text from the given bounding box on the image (format: [x1, y1, x2, y2]).
      Bounding Box:
  
  # Prompt mode (which prompt to use)
  prompt_mode: "prompt_layout_all_en"  # prompt_layout_all_en, prompt_layout_only_en, prompt_ocr, prompt_grounding_ocr
  
  # Layout detection parameters
  layout:
    # Minimum element size for detection
    min_element_size: 10  # pixels
    
    # Detection confidence threshold
    confidence_threshold: 0.5
    
    # Element types to detect
    element_types:
      - Caption
      - Footnote
      - Formula
      - List-item
      - Page-footer
      - Page-header
      - Picture
      - Section-header
      - Table
      - Text
      - Title
  
  # Reading order building settings
  reading_order:
    # Reading order building method (top-to-bottom, left-to-right, or combined)
    method: "combined"
    
    # Consider element grouping
    use_grouping: true

# Qwen OCR settings for text recognition
qwen_ocr:
  # Model for OCR
  model: "qwen2-vl-7b-instruct"  # or other VL model
  
  # API URL
  base_url: null  # if null - uses local model
  
  # Recognition parameters
  recognition:
    # Recognition languages
    languages: ["en", "ru"]
    
    # Image resolution for OCR (higher = better quality, but slower)
    resolution: 300
    
    # Timeout per image
    timeout: 30
  
  # Batch processing
  batch:
    # Batch size for processing
    size: 10
    
    # Maximum batch wait time
    max_wait_time: 5

# Image processing settings
image_processing:
  # Image format for OCR
  format: "PNG"
  
  # Image quality (for JPEG)
  quality: 95
  
  # DPI for page rendering
  dpi: 300
  
  # Maximum image size (pixels)
  max_size: 4096
  
  # Optimization for OCR
  optimize_for_ocr: true
  
  # Image preprocessing
  preprocessing:
    # Contrast enhancement
    enhance_contrast: false
    
    # Noise removal
    denoise: false
    
    # Binarization (for scans)
    binarize: false

# Coordinate (bbox) settings
coordinates:
  # Coordinate precision (decimal places)
  precision: 2
  
  # Coordinate normalization (relative to page or absolute)
  normalize: false
  
  # Units of measurement (pixels, points, mm)
  units: "pixels"

# Layout Type → ElementType mapping settings
type_mapping:
  # Dots.OCR type mapping to ElementType
  layout_to_element:
    "Section-header": "HEADER_N"  # level determined separately
    "Title": "TITLE"
    "Text": "TEXT"
    "Picture": "IMAGE"
    "Table": "TABLE"
    "Caption": "CAPTION"
    "Formula": "FORMULA"
    "Footnote": "FOOTNOTE"
    "List-item": "LIST_ITEM"
    "Page-header": "PAGE_HEADER"
    "Page-footer": "PAGE_FOOTER"
  
  # Rules for determining header level from Section-header
  header_level:
    # Use LLM for level determination
    use_llm: true
    
    # Or use heuristics (font size, position, etc.)
    use_heuristics: true

# Performance settings
performance:
  # Parallel page processing
  parallel_processing: true
  
  # Number of threads for parallel processing
  num_workers: 4
  
  # Cache layout detection results
  cache_layout: true
  
  # Cache OCR results
  cache_ocr: true
