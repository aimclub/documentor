# Configuration for PDF parser

pdf_parser:
  # Layout Detection
  layout_detection:
    render_scale: 2.0  # scale increase for rendering
    optimize_for_ocr: true
    use_direct_api: true  # use direct API call
  
  # Element filtering
  filtering:
    remove_page_headers: true
    remove_page_footers: true
  
  # Table parsing
  table_parsing:
    method: "markdown"  # "markdown" or "dataframe"
    qwen_model: "qwen2.5-7b-vl-instruct"  # model for table parsing
    detect_merged_tables: true  # detect merged tables
  
  # Header analysis
  header_analysis:
    use_font_size: true  # use font size to determine level
    use_position: true  # use position to determine level
    min_font_size_diff: 2  # minimum font size difference for different levels
