# Конфигурация для PDF парсера

pdf_parser:
  # Layout Detection
  layout_detection:
    render_scale: 2.0  # увеличение при рендеринге
    optimize_for_ocr: true
    use_direct_api: true  # использовать прямой вызов API
  
  # Фильтрация элементов
  filtering:
    remove_page_headers: true
    remove_page_footers: true
  
  # Парсинг таблиц
  table_parsing:
    method: "markdown"  # "markdown" или "dataframe"
    qwen_model: "qwen2.5-7b-vl-instruct"  # модель для парсинга таблиц
    detect_merged_tables: true  # определять склеенные таблицы
  
  # Анализ заголовков
  header_analysis:
    use_font_size: true  # использовать размер шрифта для определения уровня
    use_position: true  # использовать позицию для определения уровня
    min_font_size_diff: 2  # минимальная разница в размере шрифта для разных уровней
